<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ChemTest | Новый адрес</title>
  <!-- Предзагрузка шрифтов и стилей -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      cursor: default;
    }

    /* анимированные частицы на фоне */
    .particle {
      position: fixed;
      background: rgba(59, 130, 246, 0.25);
      border-radius: 50%;
      pointer-events: none;
      filter: blur(2px);
      animation: floatParticle linear infinite;
      z-index: 0;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) translateX(0) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 0.6;
      }
      80% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-20vh) translateX(40px) rotate(360deg);
        opacity: 0;
      }
    }

    /* орбитальные кольца (декор) */
    .orbit {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.2);
      pointer-events: none;
      animation: rotateOrbit 30s linear infinite;
    }

    @keyframes rotateOrbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* главная карточка */
    .card {
      position: relative;
      z-index: 10;
      max-width: 620px;
      width: 100%;
      background: rgba(15, 25, 45, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 56px;
      border: 1px solid rgba(59, 130, 246, 0.4);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.2) inset, 0 0 20px rgba(59, 130, 246, 0.3);
      padding: 40px 32px 48px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: floatCard 3s infinite alternate ease-in-out;
    }

    .card:hover {
      transform: scale(1.01);
      box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(59, 130, 246, 0.5) inset;
    }

    @keyframes floatCard {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }

    /* иконка / логотип */
    .icon-badge {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .atom-wrapper {
      background: rgba(59, 130, 246, 0.15);
      width: 80px;
      height: 80px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(59, 130, 246, 0.6);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.6);}
      70% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.9);}
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); border-color: rgba(59, 130, 246, 0.6);}
    }

    .atom-icon {
      width: 48px;
      height: 48px;
      animation: spinSlow 12s linear infinite;
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* текст */
    h1 {
      font-size: 54px;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #FFFFFF, #93c5fd, #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -1px;
      margin-bottom: 16px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .moving-text {
      text-align: center;
      font-size: 26px;
      font-weight: 600;
      color: #e0f2fe;
      margin-bottom: 16px;
      background: linear-gradient(120deg, #facc15, #f97316, #facc15);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 2.2s infinite;
    }

    @keyframes shimmer {
      0% { opacity: 0.7; background-position: -100%;}
      100% { opacity: 1; background-position: 200%;}
    }

    .sub-message {
      text-align: center;
      font-size: 18px;
      color: #b9c7da;
      margin-bottom: 36px;
      font-weight: 400;
      line-height: 1.4;
      border-left: 3px solid #3b82f6;
      border-right: 3px solid #3b82f6;
      display: inline-block;
      width: auto;
      padding: 0 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 40px;
    }

    .link-box {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 80px;
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 130, 246, 0.6);
      transition: all 0.2s;
      margin-top: 12px;
    }

    .link-url {
      font-size: 20px;
      font-weight: 600;
      font-family: monospace;
      letter-spacing: 1px;
      color: #facc15;
      word-break: break-all;
      background: rgba(0,0,0,0.3);
      padding: 6px 12px;
      border-radius: 40px;
    }

    .copy-btn, .visit-btn {
      background: linear-gradient(105deg, #1e2a47, #0f172a);
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(59, 130, 246, 0.6);
      box-shadow: 0 5px 12px rgba(0,0,0,0.3);
    }

    .visit-btn {
      background: linear-gradient(105deg, #3b82f6, #2563eb);
      box-shadow: 0 5px 15px rgba(59,130,246,0.4);
    }

    .copy-btn:hover, .visit-btn:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    .copy-btn:active, .visit-btn:active {
      transform: scale(0.98);
    }

    .tooltip-msg {
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      color: #7e9ed1;
      transition: 0.2s;
    }

    .highlight {
      color: #facc15;
      font-weight: 600;
    }

    /* анимация частиц, генерируемых при нажатии */
    .fly-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      background: radial-gradient(circle, #facc15, #f97316);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      filter: blur(1px);
      animation: flyPop 0.6s ease-out forwards;
    }

    @keyframes flyPop {
      0% { transform: scale(1) translateY(0); opacity: 1;}
      100% { transform: scale(0) translateY(-80px); opacity: 0;}
    }

    .footer-note {
      text-align: center;
      font-size: 13px;
      margin-top: 32px;
      color: #4f6f9f;
      border-top: 1px dashed #2d3a5e;
      padding-top: 20px;
    }

    @media (max-width: 550px) {
      .card {
        padding: 32px 20px 36px;
      }
      h1 {
        font-size: 42px;
      }
      .moving-text {
        font-size: 22px;
      }
      .link-url {
        font-size: 16px;
        text-align: center;
        width: 100%;
      }
      .link-box {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<!-- орбитальные кольца (декор, CSS) -->
<div class="orbit" style="width: 380px; height: 380px; left: -100px; top: -80px; border-width: 1.5px;"></div>
<div class="orbit" style="width: 580px; height: 580px; right: -150px; bottom: -120px; border-width: 1px; animation-duration: 40s;"></div>
<div class="orbit" style="width: 250px; height: 250px; right: 20%; top: 15%; border-width: 0.8px; animation-duration: 22s; opacity: 0.5;"></div>

<!-- основной контент -->
<div class="card">
  <div class="icon-badge">
    <div class="atom-wrapper">
      <svg class="atom-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="12" fill="#3b82f6" stroke="#93c5fd" stroke-width="1.5"/>
        <ellipse cx="50" cy="50" rx="40" ry="18" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
        <ellipse cx="50" cy="50" rx="40" ry="18" stroke="#06b6d4" stroke-width="2" opacity="0.9" transform="rotate(60 50 50)"/>
        <ellipse cx="50" cy="50" rx="40" ry="18" stroke="#facc15" stroke-width="2" opacity="0.7" transform="rotate(120 50 50)"/>
        <circle cx="50" cy="50" r="5" fill="white" fill-opacity="0.8"/>
      </svg>
    </div>
  </div>

  <h1>✨ Мы переехали ✨</h1>
  <div class="moving-text">🚀 ChemTest теперь на новом сайте 🚀</div>
  
  <div style="text-align: center;">
    <div class="sub-message">
      ⚡ Все тесты, новые вопросы и удобный интерфейс ждут тебя по новой ссылке ⚡
    </div>
  </div>
  
  <!-- блок ссылки -->
  <div class="link-box">
    <span class="link-url" id="newLink">https://bit.ly/ChemTest-10</span>
    <div style="display: flex; gap: 12px;">
      <button class="copy-btn" id="copyBtn">📋 Копировать</button>
      <button class="visit-btn" id="visitBtn">➡️ Перейти</button>
    </div>
  </div>
  <div class="tooltip-msg" id="tooltipMsg">👆 Нажми «Перейти», чтобы открыть новую страницу</div>

  <div class="footer-note">
    🧪 Химия — это интересно! Сохрани новый адрес и продолжай подготовку 🧪
  </div>
</div>

<script>
  // Фоновая генерация частиц для магии
  (function createBackgroundParticles() {
    const particleCount = 45;
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 10 + 3;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 10 + 5 + 's';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.opacity = Math.random() * 0.4 + 0.1;
      document.body.appendChild(particle);
    }
  })();

  // спецэффект "частицы радости" при клике
  function createFlyEffect(x, y) {
    for (let i = 0; i < 16; i++) {
      const fly = document.createElement('div');
      fly.classList.add('fly-particle');
      fly.style.left = (x + (Math.random() - 0.5) * 30) + 'px';
      fly.style.top = (y + (Math.random() - 0.5) * 30) + 'px';
      fly.style.background = `radial-gradient(circle, ${Math.random() > 0.5 ? '#facc15' : '#3b82f6'}, ${Math.random() > 0.7 ? '#f97316' : '#06b6d4'})`;
      document.body.appendChild(fly);
      setTimeout(() => fly.remove(), 700);
    }
  }

  // обработка копирования
  const copyBtn = document.getElementById('copyBtn');
  const visitBtn = document.getElementById('visitBtn');
  const tooltipSpan = document.getElementById('tooltipMsg');
  const newLinkSpan = document.getElementById('newLink');
  const targetUrl = 'https://bit.ly/ChemTest-10';

  // анимация при копировании + обратная связь
  copyBtn.addEventListener('click', (event) => {
    const rect = copyBtn.getBoundingClientRect();
    createFlyEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);
    
    navigator.clipboard.writeText(targetUrl).then(() => {
      tooltipSpan.innerHTML = '✅ Скопировано! Теперь вставь в браузер и переходи ✅';
      tooltipSpan.style.color = '#facc15';
      setTimeout(() => {
        tooltipSpan.innerHTML = '👆 Нажми «Перейти», чтобы открыть новую страницу';
        tooltipSpan.style.color = '#7e9ed1';
      }, 2500);
    }).catch(() => {
      tooltipSpan.innerHTML = '❌ Не удалось скопировать, скопируй вручную ❌';
      setTimeout(() => {
        tooltipSpan.innerHTML = '👆 Нажми «Перейти», чтобы открыть новую страницу';
      }, 2000);
    });
  });

  // переход по ссылке + дополнительная анимация
  visitBtn.addEventListener('click', (event) => {
    const rect = visitBtn.getBoundingClientRect();
    createFlyEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);
    
    // Визуальный фидбек: плавное "исчезновение" карточки с эффектом
    const card = document.querySelector('.card');
    card.style.transition = 'opacity 0.2s ease, transform 0.2s';
    card.style.opacity = '0.8';
    card.style.transform = 'scale(0.98)';
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 120);
  });

  // Добавим приятный эффект при наведении на саму ссылку, подсветка
  newLinkSpan.addEventListener('mouseenter', () => {
    newLinkSpan.style.textShadow = '0 0 5px #facc15';
    newLinkSpan.style.cursor = 'pointer';
  });
  newLinkSpan.addEventListener('mouseleave', () => {
    newLinkSpan.style.textShadow = 'none';
  });
  newLinkSpan.addEventListener('click', (e) => {
    const rect = newLinkSpan.getBoundingClientRect();
    createFlyEffect(rect.left + rect.width / 2, rect.top + rect.height / 2);
    navigator.clipboard.writeText(targetUrl);
    tooltipSpan.innerHTML = '📋 Ссылка в буфере! Нажми "Перейти" 📋';
    tooltipSpan.style.color = '#facc15';
    setTimeout(() => {
      tooltipSpan.innerHTML = '👆 Нажми «Перейти», чтобы открыть новую страницу';
      tooltipSpan.style.color = '#7e9ed1';
    }, 2000);
  });

  // добавим редирект-эффект на всю карточку (необяз), но только по клику на визит и копирование
  // дополнительно красивое confetti-подобие при загрузке (лёгкое)
  function welcomeSparkles() {
    for (let i = 0; i < 28; i++) {
      setTimeout(() => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight * 0.5;
        const fly = document.createElement('div');
        fly.classList.add('fly-particle');
        fly.style.left = x + 'px';
        fly.style.top = y + 'px';
        fly.style.background = `radial-gradient(circle, #3b82f6, #a5f3fc)`;
        document.body.appendChild(fly);
        setTimeout(() => fly.remove(), 500);
      }, i * 50);
    }
  }
  window.addEventListener('load', () => {
    setTimeout(welcomeSparkles, 200);
  });
</script>
</body>
</html>
